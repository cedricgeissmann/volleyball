<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />

		<!-- Favicons -->
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="%sveltekit.assets%/favicon-32x32.png"
		/>
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="%sveltekit.assets%/apple-touch-icon.png"
		/>
		<link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />

		<!-- Meta -->
		<meta
			name="description"
			content="TV Muttenz Volleyball - Moderne Trainingsmethoden mit dem Constraints-Led Approach"
		/>
		<meta name="theme-color" content="#FF3500" />

		<!-- OpenGraph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="TV Muttenz Volleyball" />
		<meta
			property="og:description"
			content="Moderne Trainingsmethoden mit dem Constraints-Led Approach"
		/>
		<meta property="og:image" content="%sveltekit.assets%/logo.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
