id: unentschlossener
name: Unentschlossene Person
beschreibung: Zögerliche Spielweise mit ständigem Infragestellen von Entscheidungen
aufgaben:
  - Ich rufe erst "Ich" und dann doch nicht, um den Ball zu spielen
  - Ich starte in mehrere Richtungen gleichzeitig ohne mich festzulegen
  - Ich frage Mitspieler während des Ballwechsels um Rat
  - Ich ändere meine taktische Entscheidung mehrmals pro Aktion
fokus: Kommunikationsstörung durch ständige Unentschlossenheit
