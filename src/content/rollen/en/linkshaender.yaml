id: linkshaender
name: Left-Handed Player
beschreibung: Exclusive use of the left hand
aufgaben:
  - I play all balls only with my left hand
  - I adjust my positioning to my left-handedness
  - I use unusual angles that are difficult for right-handers
  - I compensate for weaknesses through creative solutions
fokus: Adapting to restricted hand use and creating new angles
