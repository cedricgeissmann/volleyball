id: perfektionist
name: Perfectionist
beschreibung: Compulsive play style with unrealistic quality demands
aufgaben:
  - I repeat every ball that wasn't perfect, even during live play
  - I correct teammates' technique during the game
  - I complain about every minimally imprecise pass
  - I demand pauses to discuss details that bother no one else
fokus: Disruption of game flow through excessive quality standards
