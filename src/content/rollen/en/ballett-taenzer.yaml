id: ballett-taenzer
name: Ballet Dancer
beschreibung: Exclusively elegant, flowing movements at all times
aufgaben:
  - I move only in flowing, dance-like motions
  - I may not stop abruptly or move jerkily
  - I play with exaggerated elegance and grace
  - I turn every action into a choreographed movement
fokus: Movement restriction through enforced elegant motor control
