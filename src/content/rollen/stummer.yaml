id: stummer
name: Stumme Person
beschreibung: Spielweise ohne verbale Kommunikationsmöglichkeit
aufgaben:
  - Ich kommuniziere ausschliesslich nonverbal durch Gesten
  - Ich nutze Handzeichen und Körpersprache für Absprachen
  - Ich mache meine Absichten durch eindeutige Bewegungen klar
  - Ich entwickle visuelle Signale mit meinen Mitspielern
fokus: Nonverbale Kommunikation und bewusste Körpersprache
