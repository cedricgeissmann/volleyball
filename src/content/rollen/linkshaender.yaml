id: linkshaender
name: Linkshändige Person
beschreibung: Ausschliessliche Verwendung der linken Hand
aufgaben:
  - Ich spiele alle Bälle nur mit meiner linken Hand
  - Ich passe meine Positionierung an meine Linkshändigkeit an
  - Ich nutze ungewohnte Winkel die für Rechtshänder schwierig sind
  - Ich kompensiere Schwächen durch kreative Lösungen
fokus: Anpassung an eingeschränkte Handnutzung und Erschaffung neuer Winkel
