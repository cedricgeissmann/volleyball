id: libero
name: Libero
beschreibung: Defensive Führungsperson und Organisation der Verteidigung
aufgaben:
  - Ich lese die Verteidigung und organisiere meine Mitspieler
  - Ich bewege mich klar und nachvollziehbar für meine Mitspieler
  - Ich berühre jeden Ball in der Verteidigung mindestens einmal
  - Ich kommuniziere Verteidigungsstrategien und setze sie um
fokus: Defensive Führung durch klare Bewegungen und konsequente Ballberührung
