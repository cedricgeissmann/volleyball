id: perfektionist
name: Perfektionistische Person
beschreibung: Zwanghafte Spielweise mit unrealistischen Qualitätsansprüchen
aufgaben:
  - Ich wiederhole jeden Ball, der nicht perfekt war, auch im Spielfluss
  - Ich korrigiere die Technik meiner Mitspieler während des Spiels
  - Ich beschwere mich über jeden minimal unpräzisen Pass
  - Ich verlange Pausen um Details zu diskutieren, die niemanden stören
fokus: Spielflussstörung durch übertriebene Qualitätsansprüche
