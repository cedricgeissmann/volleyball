id: klebefuesse
name: Klebefüsse
beschreibung: Unbewegliche Spielweise mit extrem reduziertem Bewegungsradius
aufgaben:
  - Ich bewege mich maximal einen Schritt in jede Richtung
  - Ich strecke mich extrem statt zu laufen
  - Ich rufe lautstark "Zu weit!" bei Bällen ausserhalb meiner Reichweite
  - Ich erwarte, dass alle Bälle direkt zu mir gespielt werden
fokus: Positionsstörung durch extreme Immobilität
