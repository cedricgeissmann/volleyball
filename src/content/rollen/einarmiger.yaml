id: einarmiger
name: Einarmige Person
beschreibung: Spielweise mit nur einem funktionsfähigen Arm
aufgaben:
  - Ich spiele jeden Ball nur mit einem Arm
  - Ich entwickle einhändige Techniken für Pritschen und Baggern
  - Ich nutze meinen Körper kreativ zur Ballkontrolle
  - Ich positioniere mich optimal um die Einschränkung zu kompensieren
fokus: Kreative Anpassung durch alternative Techniken mit einem Arm
