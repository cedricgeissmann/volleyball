id: statistik-nerd
name: Statistik-Begeisterte
beschreibung: Zahlenverliebte Spielweise mit Kommentierung und Analyse von allem
aufgaben:
  - Ich verkünde lautstark meine Erfolgsquote nach jedem Ballkontakt
