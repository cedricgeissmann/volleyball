id: risikofreund
name: Risikofreudige Person
beschreibung: Mutige Spielweise mit bewusstem Eingehen von Risiken für höheren Ertrag
aufgaben:
  - Ich versuche schwierige Bälle auch unter hohem Risiko zu spielen
  - Ich wähle offensive Spielzüge statt sicherer Alternativen
