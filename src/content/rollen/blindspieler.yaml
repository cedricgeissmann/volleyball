id: blindspieler
name: Blind Spielende Person
beschreibung: Spielweise mit stark eingeschränktem Sehvermögen
aufgaben:
  - Ich spiele mit geschlossenen oder stark eingeschränkten Augen
  - Ich verlasse mich auf akustische Signale meiner Mitspieler
  - Ich nutze mein Gehör um Ballposition zu erfassen
  - Ich kommuniziere ständig meine Position und Bereitschaft
fokus: Sensorische Anpassung durch Nutzung alternativer Wahrnehmungskanäle
