id: ballett-taenzer
name: Ballett-Tanzende
beschreibung: Ausschliesslich elegante, fliessende Bewegungen
aufgaben:
  - Ich bewege mich nur in fliessenden, tänzerischen Bewegungen
  - Ich darf nicht abrupt stoppen oder ruckartig agieren
  - Ich spiele mit übertriebener Eleganz und Anmut
  - Ich mache aus jeder Aktion eine choreografierte Bewegung
fokus: Bewegungseinschränkung durch erzwungene elegante Motorik
