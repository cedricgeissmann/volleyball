id: aufschlaeger
name: Aufschlagende Person
beschreibung: Strategische Serviceabgabe mit variantenreichem Aufschlagspiel
aufgaben:
  - Ich variiere zwischen kraftvollen und platzierten Aufschlägen
  - Ich identifiziere Schwächen in der gegnerischen Annahme
  - Ich passe meine Aufschlagstrategie an die Spielsituation an
  - Ich setze Gegner gezielt unter Druck durch unerwartete Variation
fokus: Taktischer Aufschlag durch Variation und gezielte Schwachstellensuche
