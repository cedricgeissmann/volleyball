id: poser
name: Posende Person
beschreibung: Selbstbewusste Demonstration von Können durch nonverbale Präsenz
aufgaben:
  - Ich zeige allen im Spielfeld, dass ich die beste Person bin
  - Ich demonstriere meine Überlegenheit ausschliesslich durch meine Spielweise
  - Ich kommuniziere meine Stärke nicht verbal
  - Ich überzeuge durch Körpersprache und Aktionen
fokus: Nonverbale Demonstration von Selbstvertrauen und Spielstärke
