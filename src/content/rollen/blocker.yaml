id: blocker
name: Blockende Person
beschreibung: Erste defensive Linie mit aktivem Raumgewinn am Netz
aufgaben:
  - Ich agiere als erste Verteidigungslinie am Netz
  - Ich nehme dem Angreifer möglichst viel Raum weg
  - Ich platziere den Block präzise und optimiere mein Timing
  - Ich unterstütze die hintere Verteidigung durch meinen Blockschatten
fokus: Raumverengung für angreifende Personen durch strategische Blockplatzierung
