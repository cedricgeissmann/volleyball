id: kommentator
name: Kommentierende Person
beschreibung: Selbsternannter Sportreporter mit Live-Kommentar
aufgaben:
  - Ich kommentiere jede Aktion wie ein Sportreporter im Fernsehen
  - Ich gebe allen Spielzügen dramatische Namen und Beschreibungen
  - Ich interviewe Mitspieler während des laufenden Spiels
  - Ich analysiere Spielsituationen ausführlich statt mitzuspielen
fokus: Ablenkung durch permanenten Live-Kommentar des Spielgeschehens
