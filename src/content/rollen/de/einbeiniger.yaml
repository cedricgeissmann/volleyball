id: einbeiniger
name: Einbeinige Person
beschreibung: Nutzung von nur einem Bein zur Fortbewegung
aufgaben:
  - Ich bewege mich nur hüpfend auf einem Bein
  - Ich darf das andere Bein nicht zur Fortbewegung nutzen
  - Ich plane meine Positionierung vorausschauend wegen langsamer Bewegung
  - Ich nutze meine Balance und Sprungkraft optimal
fokus: Mobilitätseinschränkung durch einbeinige Fortbewegung
