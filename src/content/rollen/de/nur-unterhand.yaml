id: nur-unterhand
name: Nur-Unterhand
beschreibung: Ausschliessliche Nutzung von Unterhandtechniken
aufgaben:
  - Ich spiele jeden Ball nur mit Bagger- oder Unterhandtechnik
  - Ich darf nicht pritschen oder oberhand spielen
  - Ich finde kreative Lösungen für Zuspielsituationen
  - Ich kompensiere fehlende Überkopftechniken durch Präzision
fokus: Technische Einschränkung auf Unterhandspiel
