id: schatten
name: Schatten
beschreibung: Bewegungsimitation einer bestimmten Person ohne Ballberührung — synchron, direkt daneben oder dahinter
aufgaben:
  - Ich beobachte meine Zielperson ständig und kopiere ihre Bewegungen sofort
  - Ich berühre keinen Ball — meine einzige Aufgabe ist die Bewegungsimitation
  - Ich positioniere mich direkt neben oder hinter meiner Zielperson
  - Ich führe jede Bewegung im exakt gleichen Moment aus — keine Verzögerung erlaubt
fokus: Synchrone Bewegungswahrnehmung durch unmittelbare Imitation einer festen Zielperson
