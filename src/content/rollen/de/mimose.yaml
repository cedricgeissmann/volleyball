id: mimose
name: Mimose
beschreibung: Überempfindliche Spielweise mit Dramatisierung jeden Kontakts
aufgaben:
  - Ich reagiere auf jeden Ballkontakt mit übertriebenen Schmerzenslauten
  - Ich dramatisiere jede körperliche Anstrengung theatralisch
  - Ich beschwere mich lautstark über zu harte oder zu schwierige Bälle
  - Ich brauche nach jedem dritten Ball eine Verschnaufpause
fokus: Humorvolle Störung durch übertriebene Empfindlichkeit
