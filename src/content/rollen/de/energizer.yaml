id: energizer
name: Energiegebende Person
beschreibung: Emotionaler Antrieb mit Motivation des Teams durch Begeisterung
aufgaben:
  - Ich zeige durch Körpersprache ständig hohe Energie
  - Ich feiere jeden Punkt mit sichtbarer Begeisterung
  - Ich pushe das Team in schwierigen Momenten durch Lautstärke
  - Ich stecke andere mit meiner positiven Energie an
fokus: Teamdynamik und Motivation durch emotionale Präsenz
