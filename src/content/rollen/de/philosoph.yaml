id: philosoph
name: Philosophierende Person
beschreibung: Nachdenkliche Spielweise mit Hinterfragen jeder Aktion
aufgaben:
  - Ich stelle während des Spiels existenzielle Fragen zum Volleyball
  - Ich reflektiere laut über den Sinn jedes einzelnen Ballkontakts
  - Ich diskutiere philosophische Konzepte statt schnell zu reagieren
  - Ich interpretiere jeden Fehler als Lebenslektion und teile diese
fokus: Tempoverzögerung durch übermässige Reflexion
