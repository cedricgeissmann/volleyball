id: feeder
name: Feedende Person
beschreibung: Aktive Unterstützung im Training durch gezieltes Einspielen von Bällen an Fehlerstellen
aufgaben:
  - Ich gebe den Ball dort ein, wo gerade ein Fehler passiert ist
  - Ich stresse die Spielenden leicht, erzeuge aber keine gefährlichen Situationen
  - Ich lese das Spiel mit und bin im richtigen Moment bereit
  - Ich passe Timing und Intensität an das Spielniveau an
fokus: Intelligentes Nachspielen zur Fehlerkorrektur ohne Überforderung
