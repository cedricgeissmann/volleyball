id: ball-sammler
name: Ball-Sammelnde Person
beschreibung: Übermotivierte Spielweise mit Beanspruchung jeden Balls
aufgaben:
  - Ich rufe bei jedem Ball "Meiner!" unabhängig von der Position
  - Ich laufe allen Bällen hinterher, auch wenn sie klar zu anderen gehören
  - Ich entschuldige mich nicht für Zusammenstösse mit Mitspielern
  - Ich bin überzeugt, dass ich jeden Ball am besten spielen kann
fokus: Raumstörung durch übertriebene Ballgier
