id: gefesselter
name: Gefesselte Person
beschreibung: Spielweise mit zusammengebundenen oder fixierten Händen
aufgaben:
  - Ich halte meine Hände zusammen als wären sie gefesselt
  - Ich spiele alle Bälle mit geschlossenen Unterarmen
  - Ich kann meine Arme nicht unabhängig voneinander bewegen
  - Ich nutze meinen ganzen Körper für Ballkontrolle
fokus: Bewegungseinschränkung durch fixierte Armhaltung
