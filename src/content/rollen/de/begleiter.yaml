id: begleiter
name: Begleitende Person
beschreibung: Unterstützende Spielweise mit ständiger Begleitung einer anderen Person
aufgaben:
  - Ich bleibe immer in der Nähe eines bestimmten Mitspielers
  - Ich unterstütze meinen Partner durch Absicherung
  - Ich übernehme Bälle die mein Partner nicht erreichen kann
  - Ich kommuniziere ständig mit meinem Begleitpartner
fokus: Kooperatives Spiel durch räumliche Bindung an einen Partner
