id: mini-spieler
name: Mini-Spielende
beschreibung: Erzwungene kleinere Körperhaltung als natürlich
aufgaben:
  - Ich spiele permanent in gebeugter oder kniender Haltung
  - Ich darf nicht zu voller Größe aufstehen
  - Ich kompensiere fehlende Reichweite durch bessere Positionierung
  - Ich springe aus der tiefen Position wenn nötig
fokus: Größeneinschränkung durch erzwungene niedrige Körperhaltung
