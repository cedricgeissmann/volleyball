id: beobachter
name: Beobachtende Person
beschreibung: Analytische Perspektive von außen für strategisches Feedback
aufgaben:
  - Ich beobachte Spielmuster und erkenne wiederkehrende Probleme
  - Ich gebe spezifisches Feedback zu taktischen Entscheidungen
  - Ich stelle Fragen, die Spielende zum Nachdenken anregen
  - Ich dokumentiere erfolgreiche und problematische Spielsituationen
fokus: Externe Perspektive zur Förderung von Selbstwahrnehmung und Reflexion
