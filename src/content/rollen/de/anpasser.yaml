id: anpasser
name: Anpassende Person
beschreibung: Flexible Problemlösung und Füllen von Lücken im Spielsystem
aufgaben:
  - Ich erkenne Situationen, in denen Mitspieler überfordert sind
  - Ich übernehme spontan Aufgaben, die sonst liegen bleiben würden
  - Ich passe meine Position ständig an die Teambedürfnisse an
  - Ich kompensiere Fehler von Mitspielern durch schnelle Reaktion
fokus: Adaptive Spielweise durch Lesen von Teambedürfnissen und Lücken
