id: uebergangsspieler
name: Übergangs-Spielende
beschreibung: Flexible Allround-Spielweise für chaotische und unstrukturierte Spielsituationen
aufgaben:
  - Ich übernehme Verantwortung wenn das System zusammenbricht
  - Ich improvisiere kreativ bei schlechten Bällen
  - Ich halte Spielzüge am Leben die eigentlich verloren sind
  - Ich schaffe aus Chaos wieder spielbare Situationen
fokus: Kreative Problemlösung in unstrukturierten Spielsituationen
