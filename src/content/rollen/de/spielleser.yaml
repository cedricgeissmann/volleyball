id: spielleser
name: Spiellesende Person
beschreibung: Analytische Beobachtung mit exzellentem Spielverständnis
aufgaben:
  - Ich antizipiere Spielzüge bevor sie entstehen
  - Ich erkenne Absichten des Gegners an kleinen Hinweisen
  - Ich positioniere mich präventiv für erwartete Situationen
  - Ich kommuniziere meine Vorhersagen ans Team
fokus: Proaktives Spiel durch exzellente Antizipation und Spielverständnis
