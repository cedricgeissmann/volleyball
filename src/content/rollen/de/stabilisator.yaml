id: stabilisator
name: Stabilisierende Person
beschreibung: Verlässliche Spielweise mit Sicherheit und Konstanz für das Team
aufgaben:
  - Ich spiele konstant fehlerarm auch unter Druck
  - Ich wähle sichere Lösungen in kritischen Momenten
  - Ich beruhige das Team durch meine Gelassenheit
  - Ich gebe dem Team Vertrauen durch verlässliche Leistung
fokus: Spielstabilität durch konstante Leistung und risikoarme Entscheidungen
