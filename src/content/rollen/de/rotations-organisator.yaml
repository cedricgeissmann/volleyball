id: rotations-organisator
name: Rotations-Organisierende
beschreibung: Systematische Koordination für Positionswechsel und Formationen
aufgaben:
  - Ich behalte die Rotation und Aufstellung im Überblick
  - Ich erinnere Mitspieler an ihre Positionswechsel
  - Ich koordiniere Läufe und Wechsel beim Aufschlag
  - Ich helfe verwirrten Personen sofort ihre Position zu finden
fokus: Strukturelle Ordnung durch systematisches Rotationsmanagement
