id: spiegel
name: Spiegel
beschreibung: Wie der Schatten, aber im gegnerischen Feld — strategisches Hindernis mit kontrolliertem Ausweichverhalten
aufgaben:
  - Ich spiegle die Bewegungen meiner Zielperson im gegnerischen Feld
  - Ich positioniere mich bewusst als Hindernis für das gegnerische Team
  - Ich kommuniziere meine Position klar, damit meine Mitspieler mich einkalkulieren können
  - Ich weiche nur aus, wenn eine Kollision absolut unvermeidbar ist und kein Mitspieler mehr um mich herum spielen kann
fokus: Strategische Präsenz als lebendes Hindernis — Ausweichen nur als letzter Ausweg
