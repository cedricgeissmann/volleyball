id: touch-minimalist
name: Touch-Minimalistische Person
beschreibung: Nur eine begrenzte Anzahl Ballkontakte pro Spiel
aufgaben:
  - Ich darf maximal jeden dritten Ball meines Teams berühren
  - Ich zähle meine Ballkontakte genau mit
  - Ich wähle strategisch aus welche Bälle ich spiele
  - Ich lasse bewusst Bälle für Mitspieler auch wenn ich sie erreichen könnte
fokus: Strategische Einschränkung durch limitierte Ballkontakte
