id: nur-oberhand
name: Nur-Oberhand
beschreibung: Ausschliessliche Nutzung von Oberhandtechniken
aufgaben:
  - Ich spiele jeden Ball nur pritschen oder oberhand
  - Ich darf nicht baggern oder unterhand spielen
  - Ich bewege mich extrem um jeden Ball oberhand zu erreichen
  - Ich entwickle oberhand Techniken auch für niedrige Bälle
fokus: Technische Einschränkung auf Oberhandspiel
