id: taktiker
name: Taktisch Denkende Person
beschreibung: Strategisches Denken mit Überblick über Spielmuster und Anpassungen
aufgaben:
  - Ich erkenne gegnerische Muster und kommuniziere sie dem Team
  - Ich schlage taktische Anpassungen während des Spiels vor
  - Ich plane mehrere Spielzüge im Voraus
  - Ich nutze Schwächen des Gegners systematisch aus
fokus: Spielintelligenz durch Mustererkennung und strategische Anpassung
