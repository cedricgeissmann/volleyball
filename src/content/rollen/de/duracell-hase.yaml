id: duracell-hase
name: Duracell-Hase
beschreibung: Energiegeladene Spielweise mit explosiver Reaktionsschnelligkeit
aufgaben:
  - Ich reagiere auf jede Spielsituation extrem schnell und früh
  - Ich beende jede Aktion mit einem Maximalsprung
  - Ich erhalte ein hohes Energieniveau durchgehend aufrecht
  - Ich zeige eine intensive Spielweise ohne Energiereserven
fokus: Maximale Energie und explosive Sprungkraft bei jeder Aktion
