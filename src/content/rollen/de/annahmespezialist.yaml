id: annahmespezialist
name: Annahme-Spezialist*in
beschreibung: Fokussierter Passempfang mit präziser Ballkontrolle beim ersten Kontakt
aufgaben:
  - Ich positioniere mich optimal zur aufschlagenden Person
  - Ich lese die Flugbahn früh und bewege mich gezielt zum Ball
