id: kommunikator
name: Kommunizierende Person
beschreibung: Verbale Führungsperson zur Verbesserung der Teamkoordination
aufgaben:
  - Ich rufe jeden Ball laut an und koordiniere Ballberührungen
  - Ich gebe meinen Mitspielern ständig Rückmeldungen zur Positionierung
  - Ich benenne gegnerische Angriffsmuster und Schwachstellen
  - Ich ermutige und motiviere meine Mitspieler verbal
fokus: Spielfluss durch konstante verbale Kommunikation und Koordination
