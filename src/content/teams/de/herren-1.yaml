id: herren-1
name: Herren 1
beschreibung: Herren Mannschaft in der 3. Liga
trainingszeiten:
  - tag: Dienstag
    zeit: '20:30 - 22:00'
    ort: Kriegacker
  - tag: Donnerstag
    zeit: '20:30 - 22:00'
    ort: Kriegacker
ziele:
  - titel: Defense First
    beschreibung: Ich spiele geduldig und lasse den Gegner Fehler machen, anstatt selbst unnötige Risiken einzugehen
  - titel: Smart not Hard
    beschreibung: Ich bin in der Lage, den Gegner mit kontrollierten, platzierten Bällen unter Druck zu setzen statt mit reiner Kraft
  - titel: Read & Signal
    beschreibung: Ich lese kontinuierlich Informationen aus dem Spiel und sende nonverbale Signale an meine Mitspieler durch Körpersprache und Positionierung
  - titel: Connected Defense (Tensegrity)
    beschreibung: Ich agiere in der Defensive als Teil eines verbundenen Systems, wo meine Position und Bewegung die Möglichkeiten meiner Mitspieler erweitert
  - titel: Power from the Legs
    beschreibung: Ich starte jede Aktion aus den Beinen und generiere Kraft durch koordinierte Ganzkörperbewegung
  - titel: Technical Versatility
    beschreibung: Ich beherrsche verschiedene Techniken und kann die Ballkontrolle situationsgerecht anpassen
  - titel: Simplify, don't Decompose
    beschreibung: Ich bin in der Lage, überfordernde Übungen durch Verlangsamung und Vereinfachung zu bewältigen, ohne sie in isolierte Einzelschritte zu zerlegen
  - titel: Representative Learning
    beschreibung: Ich verstehe, dass ich durch meine aktive Teilnahme im Training wertvolle Lerngelegenheiten für alle Mitspieler schaffe
  - titel: Exploratory Mindset
    beschreibung: Ich bin offen für Experimente, erforsche verschiedene Lösungswege und sehe Unsicherheit als Teil des Lernprozesses
  - titel: Reliability & Support
    beschreibung: Ich erscheine pünktlich, bin zuverlässig und unterstütze das Team aktiv wo immer nötig
  - titel: Full Commitment on Game Days
    beschreibung: Ich bin an Heimspieltagen den ganzen Tag präsent und bringe mich aktiv für den Verein ein
  - titel: Team Spirit in Action
    beschreibung: Ich übernehme Verantwortung für gemeinsame Aufgaben und setze mich als Teil des Teams ein
  - titel: Welcoming Culture
    beschreibung: Ich unterstütze neue Spieler aktiv beim Einstieg in unsere Spielphilosophie und Teamkultur
