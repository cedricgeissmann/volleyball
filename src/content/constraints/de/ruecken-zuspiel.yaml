id: ruecken-zuspiel
name: Rücken-Zuspiel
beschreibung: Alle Zuspieler müssen das Zuspiel mit dem Rücken zum Netz ausführen.
erklaerung: |
  Die zuspielegebende Person muss beim Zuspiel immer mit dem Rücken in Richtung Netz stehen — sie darf nicht zum Netz gedreht sein.
  Der Ball wird nach hinten über die Schulter oder seitlich zugespielt, ohne dass sich die Person zum Netz dreht.
  Ein Zuspiel mit dem Gesicht zum Netz gibt dem Gegner einen Punkt.
  Der Zuspieler muss lernen, die Richtung und Weite des Zuspiels ohne direkten Sichtkontakt zum Netz zu steuern.
nutzen: |
  Dieser Constraint schult das räumliche Wahrnehmungsvermögen und die Fähigkeit, den Ball ohne direkte Sicht auf das Zielgebiet präzise zuzuspielen.
  Er trainiert das Körpergefühl beim Zuspiel und verbessert die Beherrschung des Balls bei schwierigen Körperpositionen.
  Gleichzeitig entwickelt er das Vertrauen in die eigene taktile Wahrnehmung und das propriozeptive Feedback.
  Teams werden gezwungen, die Kommunikation zwischen Angreifer und Zuspieler zu intensivieren, da der Zuspieler auf verbale Hinweise angewiesen ist.
kategorie: Aufbau
schwierigkeit: schwer
typ: technisch
