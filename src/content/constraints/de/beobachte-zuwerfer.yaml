id: beobachte-zuwerfer
name: Augen auf die zugebende Person
beschreibung: Alle Spieler müssen die zugebende Person durchgehend mit den Augen verfolgen — kein Blick auf den Ball allein.
erklaerung: |
  Jede spielende Person muss ihren Blick kontinuierlich auf die Person richten, die den Ball zuspielt oder einwirft — nicht auf den Ball selbst.
  Der Ball wird peripher wahrgenommen, die zugebende Person steht im visuellen Mittelpunkt.
  Wer den Kopf in eine andere Richtung dreht oder nur den Ball anschaut, wird vom Coach oder Beobachter darauf hingewiesen.
  Diese Regel gilt für alle Spielphasen: Annahme, Zuspiel und Angriff.
nutzen: |
  Dieser Constraint trainiert das Lesen der Körpersprache der zugebenden Person — eine der wichtigsten Informationsquellen im Volleyball.
  Spieler lernen, aus Schulterstellung, Anlauf und Armhaltung die Ballrichtung vorauszusehen, bevor der Ball überhaupt gespielt wird.
  Diese Fähigkeit ist entscheidend für schnelle Antizipation und frühes Positionieren.
  Langfristig verbessert sich die Reaktionszeit erheblich, da Spieler früher wissen, wohin der Ball kommt.
kategorie: Allgemein
schwierigkeit: mittel
typ: technisch
