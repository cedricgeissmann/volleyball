id: overhand-pflicht
name: Fingerpass-Pflicht
beschreibung: Alle Ballkontakte müssen als Fingerpass (Oberhandpass) gespielt werden.
erklaerung: |
  Jeder Ballkontakt — Annahme, Zuspiel und Angriff — muss als Fingerpass mit beiden Händen über dem Kopf gespielt werden.
  Bagger, Schlag oder einarmige Aktionen sind nicht erlaubt.
  Wer nicht den Fingerpass verwendet, verliert den Punkt.
  Harte Bälle, die normalerweise gebaggert würden, müssen ebenfalls mit den Fingern gespielt werden.
nutzen: |
  Dieser Constraint schult die Fingerpasstechnik unter echtem Spieldruck in allen möglichen Situationen.
  Spieler müssen lernen, auch schwierige Bälle mit dem Fingerpass zu kontrollieren — was Fingerstärke, Koordination und Handgelenksflexibilität fördert.
  Ausserdem trainiert er das Spielen über dem Körperschwerpunkt und verbessert die Gesamtkörperhaltung beim Spielen.
kategorie: Allgemein
schwierigkeit: schwer
