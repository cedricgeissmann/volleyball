id: faustschlag
name: Faustschlag
beschreibung: Jeder Angriff muss mit der geschlossenen Faust ausgeführt werden — keine offene Hand erlaubt.
erklaerung: |
  Alle Angriffe müssen mit der geschlossenen Faust gespielt werden — die Finger sind zusammengeballt, die Hand ist fest.
  Eine offene Hand beim Angriff, ein Tipper oder ein Fingerball ist nicht erlaubt und gibt dem Gegner einen Punkt.
  Der Schlagkontakt erfolgt auf den Knöcheln oder der Faustaußenseite.
  Finten mit der Faust sind erlaubt, solange die Hand nicht geöffnet wird.
nutzen: |
  Der Faustschlag verändert den Treffpunkt und die Schlagfläche grundlegend — Spieler müssen ihre Schlagtechnik komplett neu kalibrieren.
  Er schult das Körpergefühl für den Kontaktmoment und macht deutlich, wie viel Kontrolle über die Hand beim normalen Angriff vorhanden ist.
  Spieler die mit der Faust angreifen müssen, lernen die Bedeutung von Körperrotation und Treffpunktpositionierung neu zu schätzen.
  Langfristig verbessert dieser Constraint das propriozeptive Bewusstsein für die Handposition beim Angriff.
kategorie: Angriff
schwierigkeit: schwer
typ: technisch
