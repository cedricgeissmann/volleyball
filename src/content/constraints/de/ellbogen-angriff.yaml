id: ellbogen-angriff
name: Ellbogen-Angriff
beschreibung: Jeder Angriff muss mit dem Ellbogen ausgeführt werden — kein offener Handkontakt erlaubt.
erklaerung: |
  Der Ball wird beim Angriff ausschliesslich mit dem Ellbogen gespielt — die Faust und die offene Hand sind nicht erlaubt.
  Der Spieler muss den Arm anwinkeln und den Ball mit der Ellbogenspitze oder der Ellbogenaussen­seite treffen.
  Finten und Tipper mit der Hand sind ebenfalls nicht gestattet.
  Ein Angriff mit der offenen Hand oder der Faust gibt dem Gegner einen Punkt.
nutzen: |
  Dieser Constraint zwingt Spieler, die Körperrotation und die Schulterposition komplett neu zu denken, da der Ellbogen eine völlig andere Schlagmechanik erfordert.
  Er macht die natürliche Dominanz der Handschlagbewegung bewusst und schult das propriozeptive Körpergefühl.
  Spieler entwickeln ein besseres Verständnis davon, welche Körperteile beim Angriff welche Funktion übernehmen.
  Der ungewöhnliche Kontaktpunkt fordert maximale Kreativität und Anpassungsfähigkeit.
kategorie: Angriff
schwierigkeit: schwer
typ: technisch
