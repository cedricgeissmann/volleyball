id: schulterangriff
name: Schulterangriff
beschreibung: Alle Angriffe müssen von der Schulter aus gespielt werden — kein hoher Armzug.
erklaerung: |
  Der Angreifer darf den Arm nicht über Schulterhöhe heben. Der Ball wird seitlich auf Schulterhöhe getroffen, ähnlich wie ein seitlicher Schlag oder ein Push von der Schulter.
  Die klassische hohe Angriffsposition mit gestrecktem Arm über dem Kopf ist verboten.
  Der Ellenbogen bleibt auf oder unter Schulterhöhe beim Ballkontakt.
  Dies kann als seitlicher Schlag, Schulter-Push oder ähnliche Variante ausgeführt werden.
nutzen: |
  Dieser ungewöhnliche Constraint zwingt Spieler, völlig neue Angriffsbewegungen zu entwickeln.
  Er schult die Kreativität, das Körpergefühl und die Fähigkeit, den Ball aus ungewohnten Positionen zu kontrollieren.
  Ausserdem stärkt er die Schulter- und Rumpfmuskulatur auf eine andere Art als der klassische Angriff.
  Im differenzierten Lernen zeigt er, wie viele Möglichkeiten es gibt, einen Ball zu spielen.
kategorie: Angriff
schwierigkeit: schwer
