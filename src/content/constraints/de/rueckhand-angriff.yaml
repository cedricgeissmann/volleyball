id: rueckhand-angriff
name: Rückhand-Angriff
beschreibung: Alle Angriffe müssen mit der Rückseite der Schlaghand gespielt werden.
erklaerung: |
  Der Angreifer trifft den Ball mit dem Handrücken statt mit der Handfläche — eine klassische "Rückhand"-Bewegung.
  Die Handfläche zeigt dabei vom Ball weg, der Knöchelbereich oder der Handrücken trifft den Ball.
  Die Bewegung kann vorwärts oder seitlich ausgeführt werden, je nach Situation.
  Alle Angriffe in einem Ballwechsel müssen diese Technik verwenden.
nutzen: |
  Dieser Constraint bricht automatisierte Bewegungsmuster auf und zwingt das Nervensystem, neue motorische Lösungen zu finden.
  Er schult die Koordination, die Hand-Auge-Verbindung und das Körpergefühl für den Ball aus einer ungewohnten Perspektive.
  Im differenzierten Lernen ist dieser Constraint besonders wertvoll: Er zeigt, dass es viele Wege gibt, einen Ball zu spielen, und fördert motorische Vielfalt.
  Nach diesem Constraint fühlt sich die normale Angriffshand oft "frischer" und kontrollierter an.
kategorie: Angriff
schwierigkeit: schwer
typ: technisch
