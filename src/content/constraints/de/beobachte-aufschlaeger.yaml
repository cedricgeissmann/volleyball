id: beobachte-aufschlaeger
name: Augen auf die aufschlagende Person
beschreibung: Alle Annehmenden müssen die aufschlagende Person beobachten — nicht den Ball, bis er abgespielt ist.
erklaerung: |
  Alle Spieler in der Annahme müssen ihren Blick auf die aufschlagende Person richten und sie beobachten, bis der Ball die Hand verlassen hat.
  Erst nach dem Ablösen des Balls darf der Blick auf den Ball gelenkt werden.
  Anlauf, Armstellung, Schulterrotation und Treffpunkt der aufschlagenden Person verraten schon vor dem Kontakt die Ballrichtung.
  Wer zu früh nur den Ball anschaut statt die Person, wird vom Coach korrigiert.
nutzen: |
  Dieser Constraint trainiert gezielt die Annahme-Antizipation — eine der wertvollsten Fähigkeiten im Hochleistungs-Volleyball.
  Spieler die die aufschlagende Person lesen, können sich früher in die richtige Position bewegen und sind weniger von der Ballflugkurve überrascht.
  Er bricht die weit verbreitete Gewohnheit, sofort den Ball zu fixieren, und ersetzt sie durch informationsreicheres Beobachten.
  Langfristig verbessert sich die Annahmequalität erheblich, weil Spieler früher wissen, wohin der Ball kommt.
kategorie: Allgemein
schwierigkeit: mittel
typ: technisch
