id: ein-auge-zu
name: Ein Auge zu
beschreibung: Alle Spieler halten während des gesamten Spiels ein Auge geschlossen.
erklaerung: |
  Jeder Spieler hält für die gesamte Dauer des Kleinfeldspiel ein Auge geschlossen — entweder das dominante oder das nicht-dominante, je nach Trainingszielsetzung.
  Das Auge kann mit der Hand bedeckt oder einfach zugekniffen werden.
  Wer das Auge öffnet, gibt dem Gegner einen Punkt.
  Eine Variante: Nur der Angreifer hält ein Auge zu, alle anderen spielen normal.
nutzen: |
  Dieser Constraint verändert die räumliche Wahrnehmung drastisch, da die binokulare Tiefenwahrnehmung wegfällt.
  Er schult die Konzentration, das periphere Sehen und die Fähigkeit, sich auf kinästhetische Signale zu verlassen statt nur auf das Sehen.
  Im differenzierten Lernen hilft er, das Timing und das Ballgefühl zu entwickeln, das unabhängig von der visuellen Kontrolle funktioniert.
  Die Auswirkung nach dem Constraint: Der Ball wirkt "grösser" und langsamer — ein interessantes Phänomen der Wahrnehmungsschulung.
kategorie: Allgemein
schwierigkeit: schwer
typ: technisch
