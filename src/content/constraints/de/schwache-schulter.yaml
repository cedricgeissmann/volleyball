id: schwache-schulter
name: Schwache Schulter
beschreibung: Alle Angriffe und Zuspieler müssen mit der nicht-dominanten Hand gespielt werden.
erklaerung: |
  Für Rechtshänder bedeutet das: alle Angriffe und Zuspiele mit links. Für Linkshänder entsprechend mit rechts.
  Annahmen dürfen mit beiden Händen (Bagger) gespielt werden — nur der zweite und dritte Kontakt muss mit der schwachen Hand erfolgen.
  Wer die dominante Hand für einen Angriff oder ein Zuspiel verwendet, gibt dem Gegner einen Punkt.
  Variante: Nur Angriffe mit der schwachen Seite, Zuspieler darf frei wählen.
nutzen: |
  Dieser Constraint schult die motorische Entwicklung der schwachen Seite konsequent und unter Spielbedingungen.
  Er verbessert die beidseitige Koordination, die Körperbalance und langfristig die Gesamtsymmetrie des Spielers.
  Ausserdem bricht er die Abhängigkeit von der dominanten Hand und öffnet neue taktische Möglichkeiten — ein beidseitig spielfähiger Spieler ist schwerer vorhersehbar.
kategorie: Angriff
schwierigkeit: schwer
