id: fersen-bodenkontakt
name: Fersen-Landung
beschreibung: Nach jedem Sprung muss die Landung auf den Fersen erfolgen — nicht auf den Fussballen.
erklaerung: |
  Nach jedem Sprung — Angriff, Block, Service — muss die Landung bewusst auf den Fersen stattfinden statt auf den Fussballen.
  Der Spieler muss die Fersen als erstes aufsetzen.
  Wer auf den Zehen oder Fussballen landet, gibt dem Gegner einen Punkt.
  Dies ist ungewohnt und erfordert bewusste Aufmerksamkeit bei jedem Sprung.
nutzen: |
  Dieser merkwürdige Constraint hat einen klaren Zweck: Er macht die Landung bewusst wahrnehmbar und schult die Körperaufmerksamkeit nach dem Sprung.
  Die ungewohnte Landung aktiviert die propriozeptive Wahrnehmung und schult das Gleichgewicht.
  Ausserdem zeigt er den Spielern, wie automatisiert ihre Landungen sind — und wie wenig sie normalerweise darüber nachdenken.
  Nach diesem Constraint landen Spieler oft mit mehr Bewusstsein und besserem Gleichgewicht.
kategorie: Allgemein
schwierigkeit: mittel
typ: technisch
