id: beide-haende-bagger
name: Gekreuzte Arme
beschreibung: Beim Bagger werden die Arme gekreuzt — rechter Arm über linken statt nebeneinander.
erklaerung: |
  Anstatt die Unterarme parallel nebeneinander zu legen (klassische Baggerhaltung), werden sie gekreuzt: der rechte Arm liegt über dem linken (oder umgekehrt).
  Der Ball wird auf den gekreuzten Unterarmen gespielt.
  Alle Baggeraktionen — Annahme, Verteidigung, Zuspiel — müssen in dieser gekreuzten Haltung gespielt werden.
  Eine geöffnete, klassische Baggerhaltung zählt als Fehler.
nutzen: |
  Dieser Constraint bricht die automatisierte Baggerbewegung auf und zwingt das Nervensystem, eine neue Kontaktfläche zu entwickeln.
  Er schult das Ballgefühl durch Reduktion der verfügbaren Fläche und verbessert die Kontrolle über Flugrichtung und Kraft.
  Im differenzierten Lernen zeigt er, dass der Körper viele Möglichkeiten hat, einen Ball zu kontrollieren — und löst starre Technik-Fixierungen.
kategorie: Allgemein
schwierigkeit: schwer
