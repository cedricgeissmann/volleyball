id: unterarm-zuspiel
name: Unterarm-Zuspiel
beschreibung: Alle Zuspieler müssen den Ball mit Unterarm (Bagger) zugespielt werden — kein Fingerball erlaubt.
erklaerung: |
  Jedes Zuspiel muss als Unterarmpass (Bagger) ausgeführt werden — die Arme sind gestreckt und zusammen, der Ball prallt von den Unterarmen ab.
  Ein Fingerball oder Pritschen als Zuspiel ist nicht erlaubt und gibt dem Gegner einen Punkt.
  Der Zuspieler muss trotzdem versuchen, den Angreifer optimal zu bedienen — ein Bagger-Zuspiel soll präzise und spielbar sein.
  Notfälle wie ein tiefer Annahmebal, bei dem ein Fingerball physisch unmöglich wäre, können vom Coach ausgenommen werden.
nutzen: |
  Dieser Constraint schult die Präzision des Unterarmpasses als Zuspieloption — eine Technik, die im normalen Spiel selten gezielt trainiert wird.
  Zuspieler die immer prippen, müssen lernen, den Unterarm als vollwertiges Zuspielwerkzeug zu nutzen.
  Er trainiert das Gefühl für Richtung und Höhe beim Bagger-Zuspiel, was in Notfallsituationen entscheidend ist.
  Angreifer gewöhnen sich daran, auch mit weniger idealen Zuspielen erfolgreich anzugreifen.
kategorie: Aufbau
schwierigkeit: schwer
typ: technisch
