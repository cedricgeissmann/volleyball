id: pancake-pflicht
name: Pancake Required
beschreibung: Every defensive action must be executed as a pancake — no normal dig or dive allowed.
erklaerung: |
  All defensive actions must be played with a pancake: the flat hand is placed on the floor and the ball bounces off the back of the hand.
  A normal dig, dive, or roll as a defensive action is not allowed.
  Anyone who saves a ball with a different technique gives the opposing team a point.
  The pancake must be clearly recognizable — the hand must touch the floor before the ball hits it.
nutzen: |
  This constraint forces players to apply the pancake technique under real game conditions rather than only practising it in drills.
  It trains early ball reading and the ability to get the flat hand under the ball in time.
  Players develop a better body feel for low balls and learn to use the pancake as a reliable tool.
  Long-term, defensive versatility increases as players master unconventional rescue techniques with confidence.
kategorie: Verteidigung
schwierigkeit: schwer
typ: technisch
