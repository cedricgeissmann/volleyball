id: finte-pflicht
name: Tip Only
beschreibung: Every attack must be a tip or placement — no hard spike allowed.
erklaerung: |
  All attacking actions must be played as controlled tips: dinks, lobs, roll shots, or targeted placements.
  A hard spike or power shot is not allowed. The ball must be placed with control and intent.
  If a player plays a hard attack, it counts as an error.
  Players must learn to place the ball intelligently rather than simply hitting it hard.
nutzen: |
  This constraint develops tactical intelligence and body awareness for controlled attacking actions.
  Players must intensively study the opponent's court positioning and find gaps.
  It also improves attack accuracy and the ability to play precisely under pressure.
  In the long run, this constraint makes attacks less predictable, as players have learned to switch between tips and hard shots.
kategorie: Angriff
schwierigkeit: mittel
typ: taktisch
