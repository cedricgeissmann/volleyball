id: beobachte-libero
name: Eyes on the Libero
beschreibung: Attackers and setters must always observe the opposing libero or defensive specialist during the rally.
erklaerung: |
  All attackers and the setter must consciously direct their gaze at the opposing libero or defensive specialist.
  The libero's position, initial movement, and alignment provide crucial clues about the planned defensive strategy.
  Anyone who does not watch the libero misses this information and plays without a tactical advantage.
  The coach or observer checks whether players are actively watching the libero.
nutzen: |
  The libero organizes the defense and often gives early signals about the defensive formation.
  This constraint trains the ability to read relevant information in the opponent's court.
  Players learn to use the libero as a tactical anchor: Where is he? Where is he moving? What is he covering?
  Long-term, attack planning improves as players actively factor in the defense when making decisions.
kategorie: Angriff
schwierigkeit: mittel
typ: technisch
