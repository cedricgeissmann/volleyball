id: ellbogen-angriff
name: Elbow Attack
beschreibung: Every attack must be performed with the elbow — no open hand contact allowed.
erklaerung: |
  The ball is played exclusively with the elbow during an attack — the fist and open hand are not allowed.
  The player must bend their arm and strike the ball with the elbow tip or outer elbow.
  Tips and placements with the hand are also not permitted.
  An attack with an open hand or fist gives the opposing team a point.
nutzen: |
  This constraint forces players to completely rethink their body rotation and shoulder positioning, as the elbow requires an entirely different striking mechanic.
  It makes the natural dominance of the hand-swing movement conscious and trains proprioceptive body awareness.
  Players develop a better understanding of which body parts perform which function during an attack.
  The unusual contact point demands maximum creativity and adaptability.
kategorie: Angriff
schwierigkeit: schwer
typ: technisch
