id: beide-haende-bagger
name: Crossed Arms Dig
beschreibung: When digging, arms are crossed — right over left instead of side by side.
erklaerung: |
  Instead of laying forearms parallel next to each other (classic dig), they are crossed: right arm over left.
  The ball is played on the crossed forearms.
  All dig actions — reception, defense, setting — must use this crossed position.
  An open, classic dig position counts as an error.
nutzen: |
  This constraint breaks the automated dig movement and forces the nervous system to develop a new contact surface.
  It trains ball feel through reduction of available surface area and improves control over flight direction and force.
  In differentiated learning, it shows the body has many ways to control a ball — dissolving rigid technique fixations.
kategorie: Allgemein
schwierigkeit: schwer
typ: technisch
