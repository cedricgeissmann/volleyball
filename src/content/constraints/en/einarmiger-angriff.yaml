id: einarmiger-angriff
name: One-Arm Attack
beschreibung: All attacks must be played with only one arm — the other stays at the body.
erklaerung: |
  When attacking, only one arm may be used. The other arm remains still at the body or behind the back.
  This applies to all attack forms: spike, tip, lob — all one-armed.
  Whoever attacks with two arms loses the point.
  Which arm is used can be freely chosen or specified by the coach (e.g. always the weak hand).
nutzen: |
  This constraint isolates the attack shoulder and trains one-armed power, balance, and body rotation.
  It shows how important body rotation and the core are for a powerful attack — since arm strength alone is not enough.
  It also trains non-dominant side coordination and breaks symmetric movement patterns.
kategorie: Angriff
schwierigkeit: mittel
