id: knieender-zuspieler
name: Kneeling Setter
beschreibung: The setter must be on one or both knees when setting the ball.
erklaerung: |
  Whoever plays the second ball must be on one or both knees at ball contact.
  The setter may kneel into position before playing — but the knee must touch the ground at contact.
  Whoever sets while standing gives the opponent a point.
  Easier variation: only one knee needs to touch the ground.
nutzen: |
  This constraint fundamentally changes the setter's body position and trains playing from low positions.
  It improves kneeling mechanics, core stability, and the ability to play a good ball from disadvantageous positions.
  It also trains the attacker to handle sets from a low trajectory — improving adaptability.
kategorie: Aufbau
schwierigkeit: schwer
