id: faustschlag
name: Fist Attack
beschreibung: Every attack must be performed with a closed fist — no open hand allowed.
erklaerung: |
  All attacks must be played with a closed fist — fingers are clenched together, the hand is firm.
  An open hand during the attack, a tip, or a finger touch is not allowed and gives the opposing team a point.
  Contact is made on the knuckles or the outer side of the fist.
  Tips with the fist are allowed as long as the hand is not opened.
nutzen: |
  The fist attack fundamentally changes the contact point and striking surface — players must completely recalibrate their striking technique.
  It trains body awareness for the moment of contact and makes clear how much control over the hand is present during a normal attack.
  Players forced to attack with a fist learn to appreciate the importance of body rotation and contact point positioning anew.
  Long-term, this constraint improves proprioceptive awareness of hand position during the attack.
kategorie: Angriff
schwierigkeit: schwer
typ: technisch
