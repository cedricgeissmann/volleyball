id: unterarm-zuspiel
name: Forearm Set
beschreibung: All sets must be played with a forearm pass (dig) — no overhead finger set allowed.
erklaerung: |
  Every set must be executed as a forearm pass (dig) — arms are extended and together, the ball bounces off the forearms.
  An overhead finger set is not allowed and gives the opposing team a point.
  The setter must still try to serve the attacker optimally — a forearm set should be precise and playable.
  Emergency situations such as a very low ball where an overhead set would be physically impossible may be excepted by the coach.
nutzen: |
  This constraint trains the precision of the forearm pass as a setting option — a technique rarely deliberately trained in normal play.
  Setters who always use overhead sets must learn to use the forearm as a fully valid setting tool.
  It trains the sense of direction and height in the forearm set, which is critical in emergency situations.
  Attackers get used to successfully attacking even with less-than-ideal sets.
kategorie: Aufbau
schwierigkeit: schwer
typ: technisch
