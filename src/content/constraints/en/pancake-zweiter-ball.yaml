id: pancake-zweiter-ball
name: Pancake — Second Contact Only
beschreibung: The second ball contact (the set) must always be played as a pancake.
erklaerung: |
  Only the second contact of the team with the ball — the set — must be executed as a pancake.
  The first contact (reception) and third contact (attack) may be played normally.
  Anyone who plays the set with a different technique gives the opposing team a point.
  The setter must get their flat hand to the floor in time and redirect the ball off the back of their hand.
nutzen: |
  This constraint is particularly unusual since the set is never normally played as a pancake.
  It forces players to use the pancake technique creatively and with control, still trying to place the ball well for the attacker.
  The setter must read the ball's trajectory very precisely in order to prepare the pancake in time.
  This constraint creates surprising situations for both teams and promotes improvisation and adaptability.
kategorie: Verteidigung
schwierigkeit: schwer
typ: technisch
