id: pancake-erster-ball
name: Pancake — First Contact Only
beschreibung: The first ball contact (reception or defense) must always be played as a pancake.
erklaerung: |
  Only the first contact of the team with the ball — reception or defense — must be executed as a pancake.
  The second and third contacts (set and attack) may be played normally.
  Anyone who plays the first ball with a different technique gives the opposing team a point.
  The pancake must be clearly recognizable: flat hand on the floor, ball bounces off the back of the hand.
nutzen: |
  This constraint isolates the pancake to the first ball contact and specifically trains the reception and defense situation.
  Players must immediately read every incoming ball as a potential pancake — sharpening anticipation.
  The rest of the rally remains unchanged, so the consequences of a good or poor pancake are directly experienced.
  Especially valuable for teams that rarely use the pancake and underestimate it as a first defensive option.
kategorie: Verteidigung
schwierigkeit: schwer
typ: technisch
