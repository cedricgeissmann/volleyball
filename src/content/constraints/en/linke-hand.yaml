id: linke-hand
name: Weak Hand
beschreibung: Every third ball contact must be played with the non-dominant hand.
erklaerung: |
  Every third ball in a sequence (contacts 3, 6, 9, etc.) must be played with the weak hand.
  For right-handed players this is the left hand, for left-handed players the right hand.
  The ball may be played one-handed or as a double contact if needed.
  The team counts contacts together and must adapt accordingly.
nutzen: |
  This playful constraint creates unexpected situations and forces the team to communicate.
  It trains ambidextrous ball feel and coordination of the weaker side.
  It also reveals how much automatisms shape play — and opens eyes to new possibilities.
  At the same time, it creates a relaxed, humorous training atmosphere that encourages creativity.
kategorie: Allgemein
schwierigkeit: einfach
