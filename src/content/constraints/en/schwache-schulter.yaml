id: schwache-schulter
name: Weak Side
beschreibung: All attacks and sets must be played with the non-dominant hand.
erklaerung: |
  For right-handed players: all attacks and sets with the left hand. For left-handed players: with the right.
  Receptions may use both hands (dig) — only the second and third contact must use the weak hand.
  Whoever uses the dominant hand for an attack or set gives the opponent a point.
  Variation: only attacks with the weak side, the setter may choose freely.
nutzen: |
  This constraint consistently trains motor development of the weak side under game conditions.
  It improves bilateral coordination, body balance, and long-term overall symmetry.
  It breaks dependence on the dominant hand and opens new tactical possibilities — a player equally capable on both sides is harder to predict.
kategorie: Angriff
schwierigkeit: schwer
typ: technisch
