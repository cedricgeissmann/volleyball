id: ein-auge-zu
name: One Eye Closed
beschreibung: All players keep one eye closed throughout the entire game.
erklaerung: |
  Each player keeps one eye closed for the entire game — either the dominant or non-dominant eye depending on the training goal.
  The eye can be covered with a hand or simply kept shut.
  Whoever opens their eye gives the opponent a point.
  Variation: only the attacker keeps one eye closed, all others play normally.
nutzen: |
  This constraint drastically changes spatial perception, as binocular depth perception is removed.
  It trains concentration, peripheral vision, and reliance on kinaesthetic signals rather than sight alone.
  In differentiated learning, it develops timing and ball feel that functions independently of visual control.
  After the constraint, the ball often seems bigger and slower — an interesting perceptual training effect.
kategorie: Allgemein
schwierigkeit: schwer
