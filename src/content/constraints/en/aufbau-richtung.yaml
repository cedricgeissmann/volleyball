id: aufbau-richtung
name: Set Direction
beschreibung: The set may only be played in one pre-determined direction.
erklaerung: |
  Before the game, a direction for the set is established: always to the outside line, always to the middle, or always backwards.
  The setter must stick to this direction — regardless of how the first ball arrives.
  The attacking team must adapt and attack from the designated position.
  The direction can be changed after each set to train different scenarios.
nutzen: |
  This constraint trains attacking from unfamiliar or non-optimal set situations.
  It prevents attackers from always waiting for their preferred set and demands flexibility.
  It also develops the setter's ability to deliberately place balls in a specific direction — even when the reception was not ideal.
kategorie: Aufbau
schwierigkeit: mittel
