id: fersen-bodenkontakt
name: Heel Landing
beschreibung: After every jump, the landing must be on the heels — not the balls of the feet.
erklaerung: |
  After every jump — attack, block, serve — the landing must consciously happen on the heels first.
  The player must place the heels down before the balls of the feet.
  Whoever lands on their toes or balls of their feet gives the opponent a point.
  This is unfamiliar and requires conscious attention on every jump.
nutzen: |
  This unusual constraint makes the landing consciously noticeable and trains body awareness after the jump.
  The unfamiliar landing activates proprioceptive perception and trains balance.
  It shows players how automated their landings are — and how little they normally think about them.
  After this constraint, players often land with more awareness and better balance.
kategorie: Allgemein
schwierigkeit: mittel
