id: overhand-pflicht
name: Overhead Only
beschreibung: All ball contacts must be played as an overhead pass (finger pass).
erklaerung: |
  Every ball contact — reception, set, and attack — must be played as an overhead finger pass with both hands above the head.
  Digs, spikes, or one-armed actions are not allowed.
  Whoever does not use the overhead pass loses the point.
  Hard balls that would normally be dug must also be played with the fingers.
nutzen: |
  This constraint trains the overhead pass under real game pressure in all possible situations.
  Players must learn to control even difficult balls with the overhead pass — developing finger strength, coordination, and wrist flexibility.
  It also trains playing above the body's centre of gravity and improves overall body posture.
kategorie: Allgemein
schwierigkeit: schwer
typ: technisch
