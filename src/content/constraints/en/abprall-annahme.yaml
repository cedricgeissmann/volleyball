id: abprall-annahme
name: Bounce Reception
beschreibung: Every reception must let the ball bounce off the floor first before being played.
erklaerung: |
  When a serve or ball enters the court, it must touch the floor and bounce once before a player receives it.
  The player deliberately lets the ball bounce and then plays it on the rebound or shortly after.
  Direct receptions without floor contact are not allowed.
  This results in a flatter, more difficult ball — that is the point.
nutzen: |
  This unusual constraint trains reading the ball's flight path well in advance, since the player must anticipate early where the ball will bounce.
  It improves footwork and early positioning.
  It trains playing low, difficult balls directly after the bounce — developing depth perception and reaction ability.
  The altered ball trajectory after the bounce trains adaptability.
kategorie: Allgemein
schwierigkeit: schwer
typ: technisch
