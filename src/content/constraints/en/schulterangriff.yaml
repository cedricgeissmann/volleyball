id: schulterangriff
name: Shoulder Attack
beschreibung: All attacks must be played from shoulder level — no high arm swing.
erklaerung: |
  The attacker may not raise their arm above shoulder height. The ball is contacted from the side at shoulder level.
  The classic high attack position with the arm stretched above the head is forbidden.
  The elbow remains at or below shoulder height at ball contact.
  This can be executed as a sideward strike, shoulder push, or similar variation.
nutzen: |
  This unusual constraint forces players to develop entirely new attack movements.
  It trains creativity, body awareness, and the ability to control the ball from unfamiliar positions.
  It also strengthens the shoulder and core muscles differently than the classic attack.
  In differentiated learning, it shows how many ways there are to play a ball.
kategorie: Angriff
schwierigkeit: schwer
typ: technisch
