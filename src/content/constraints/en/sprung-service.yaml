id: sprung-service
name: Jump Serve
beschreibung: Every serve must be executed as a jump serve.
erklaerung: |
  All serves must be played with a jump — no standing serve or float serve is allowed.
  The jump must be clearly visible and take place behind the baseline.
  The serve must still legally go over the net and into the opponent's court.
  Whoever does not jump, or whose serve lands out, gives a point to the other team.
nutzen: |
  This constraint trains the timing, coordination, and rhythm of the jump serve under game conditions.
  Players who have not yet mastered the jump serve must still apply it — accelerating development.
  It also trains the receiving team to handle faster, more aggressive serves.
kategorie: Allgemein
schwierigkeit: mittel
typ: technisch
