id: beobachte-aufschlaeger
name: Eyes on the Server
beschreibung: All receivers must watch the serving player — not the ball, until it has left their hand.
erklaerung: |
  All players in reception must keep their gaze on the serving player and observe them until the ball has left their hand.
  Only after the ball is released may they shift focus to the ball itself.
  The server's approach, arm position, shoulder rotation, and contact point already reveal the ball's direction before contact is made.
  Anyone who fixates on the ball too early instead of the server is corrected by the coach.
nutzen: |
  This constraint specifically trains reception anticipation — one of the most valuable skills in high-level volleyball.
  Players who read the server can move to the correct position earlier and are less surprised by the ball's flight path.
  It breaks the widespread habit of immediately fixating on the ball and replaces it with more information-rich observation.
  Long-term, reception quality improves significantly as players know earlier where the ball is going.
kategorie: Allgemein
schwierigkeit: mittel
typ: technisch
