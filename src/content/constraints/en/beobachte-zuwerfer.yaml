id: beobachte-zuwerfer
name: Eyes on the Passer
beschreibung: All players must continuously track the player passing or feeding the ball — not the ball alone.
erklaerung: |
  Every player must keep their gaze continuously on the person playing or feeding the ball — not on the ball itself.
  The ball is perceived peripherally; the passing player is the visual focus.
  Anyone who turns their head elsewhere or only watches the ball is corrected by the coach or observer.
  This rule applies to all phases of play: reception, setting, and attack.
nutzen: |
  This constraint trains the reading of the passing player's body language — one of the most important sources of information in volleyball.
  Players learn to anticipate the ball's direction from shoulder position, approach, and arm posture before the ball is even played.
  This ability is critical for fast anticipation and early positioning.
  Long-term, reaction time improves significantly as players know earlier where the ball is going.
kategorie: Allgemein
schwierigkeit: mittel
typ: technisch
