id: rueckhand-angriff
name: Backhand Attack
beschreibung: All attacks must be played with the back of the hitting hand.
erklaerung: |
  The attacker contacts the ball with the back of the hand rather than the palm — a classic backhand motion.
  The palm faces away from the ball; the knuckle area or back of the hand makes contact.
  The movement can be forward or sideward depending on the situation.
  All attacks in a rally must use this technique.
nutzen: |
  This constraint breaks automated movement patterns and forces the nervous system to find new motor solutions.
  It trains coordination, hand-eye connection, and body awareness for the ball from an unfamiliar angle.
  In differentiated learning, it shows there are many ways to play a ball, and promotes motor variety.
  After this constraint, players often find their normal attacking hand feels fresher and more controlled.
kategorie: Angriff
schwierigkeit: schwer
