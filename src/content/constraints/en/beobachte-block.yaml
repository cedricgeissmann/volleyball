id: beobachte-block
name: Eyes on the Block
beschreibung: Attackers must fix their gaze on the opposing block during approach and jump — no looking at the open court.
erklaerung: |
  During an attack, the attacker's eyes must be focused on the hands and position of the opposing block.
  Looking at the open court or the defense is not allowed — the block is the visual focus.
  Anyone who does not watch the block is corrected by the observer or coach.
  The attacker must then decide based on their block observation: over the block, past the block, or around it.
nutzen: |
  This constraint trains conscious reading of the block — a core skill for advanced attackers.
  Many players instinctively look at the open court during an attack and ignore the block. This constraint breaks that pattern.
  Players develop the ability to read block hands and deliberately exploit wipe-offs, angles, or gaps.
  Long-term, attacks become more varied and intelligent as the block is used as information.
kategorie: Angriff
schwierigkeit: schwer
typ: technisch
