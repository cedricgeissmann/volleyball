id: baggerpflicht
name: Dig Only
beschreibung: All ball contacts must be played as a dig (forearm pass).
erklaerung: |
  Every ball contact — reception, set, and attack — must be played as a dig with both forearms.
  Overhead pass, spike, tip with the palm, or one-armed actions are not allowed.
  Whoever does not dig loses the point.
  This applies to all three contacts, even when an overhead pass would be technically easier.
nutzen: |
  This constraint intensively trains dig technique in all game situations, not only during reception.
  Players must learn to use the dig creatively for setting and attacking — which enormously improves ball feel and control.
  It also reveals technical weaknesses in the dig, since there is no alternative.
kategorie: Allgemein
schwierigkeit: schwer
