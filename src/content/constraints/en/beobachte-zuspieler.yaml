id: beobachte-zuspieler
name: Eyes on the Setter
beschreibung: All attackers must continuously watch the setter — not the ball, until it has left their hands.
erklaerung: |
  Attackers must keep their gaze on the setter and observe them until the ball has left their hands.
  Only after the ball is released may the attacker shift their focus to the ball itself.
  Anyone who looks at the ball too early instead of the setter is corrected by the coach or observer.
  The setter's shoulder position, location, and body posture already reveal where the set is going before it is released.
nutzen: |
  This constraint trains the anticipation of the set from the setter's body language.
  Attackers learn to choose their approach and attack position before the ball is even in the air — saving valuable fractions of a second.
  It trains the simultaneous perception of setter, ball, and block at the same time.
  Long-term, attackers become faster and more confident in their positioning because they absorb information earlier.
kategorie: Angriff
schwierigkeit: mittel
typ: technisch
