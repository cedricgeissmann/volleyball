id: hohes-zuspiel
name: High Set
beschreibung: Every set must be played at least two metres above net height.
erklaerung: |
  All setters must play the ball very high — at least two metres above the top of the net.
  A set that does not reach this minimum height counts as an error and gives the opposing team a point.
  The high set gives the attacker more time, but also gives the opposing block more reaction time.
  The attacker must learn to maintain tension and timing despite the long waiting period.
nutzen: |
  This constraint trains the attacker's patience: a high set means a long hang time and lots of time to think — and to hesitate.
  It develops the sense of timing for the takeoff, since jumping too early with a high set is catastrophic.
  It also trains the setter on controlled, high plays — an important basic skill when reception is poor.
  Teams learn to attack in a structured and effective way even with slower sets.
kategorie: Aufbau
schwierigkeit: mittel
typ: technisch
