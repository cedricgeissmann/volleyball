id: stille-kommunikation
name: Silent Play
beschreibung: No verbal communication allowed — only gestures and eye contact.
erklaerung: |
  During the entire small-sided game, verbal communication is forbidden.
  No "Mine!", no "Yours!", no calling out positions or actions.
  Players must communicate exclusively through body language, eye contact, and gestures.
  Anyone who speaks gives the opponent a point.
nutzen: |
  This constraint develops non-verbal communication and the ability to read teammates.
  Players must learn to pay attention to body language and movement patterns — a core competency in high-performance volleyball.
  It also reveals how dependent a team is on verbal communication and shows areas for development.
  It is also mentally demanding and trains concentration.
kategorie: Allgemein
schwierigkeit: schwer
typ: taktisch
