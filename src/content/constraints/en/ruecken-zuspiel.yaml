id: ruecken-zuspiel
name: Back-to-Net Set
beschreibung: All setters must execute the set with their back facing the net.
erklaerung: |
  The setting player must always stand with their back toward the net when setting — they may not be turned to face the net.
  The ball is set backwards over the shoulder or sideways, without the player turning toward the net.
  A set performed while facing the net gives the opposing team a point.
  The setter must learn to control the direction and distance of the set without direct visual contact with the target area.
nutzen: |
  This constraint trains spatial awareness and the ability to precisely set the ball without direct sight of the target zone.
  It develops body control during setting and improves ball mastery in difficult body positions.
  It also builds trust in tactile perception and proprioceptive feedback.
  Teams are forced to intensify communication between the attacker and setter, as the setter depends on verbal cues.
kategorie: Aufbau
schwierigkeit: schwer
typ: technisch
